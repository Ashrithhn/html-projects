version: '3.8'

services:
  web:
    build: .
    container_name: html-projects-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # Mount the contacts.json file to persist form submissions
      - ./contacts.json:/app/contacts.json
    restart: unless-stopped
